<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢 3D 卡牌對戰</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; background-color: #f4f4f9; 
            margin: 0; padding: 20px 10px; overflow-x: hidden; /* 防止出現橫向捲軸 */
            user-select: none; 
        }
        h1 { color: #333; margin-top: 10px; font-size: 24px; }
        
        .controls { margin-bottom: 20px; }
        button { 
            padding: 12px 24px; font-size: 16px; margin: 0 5px; 
            cursor: pointer; background-color: #ffcc00; 
            border: none; border-radius: 8px; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;
        }
        button:hover { background-color: #e6b800; transform: translateY(-2px); }
        button:disabled { background-color: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

        /* ================= 3D 旋轉選卡區塊 ================= */
        #selection-screen { margin-top: 20px; width: 100%; }
        #selection-screen h2 { color: #555; font-size: 18px; }
        .drag-hint { color: #e91e63; font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        
        .scene {
            margin: 40px auto; width: 200px; height: 280px;
            perspective: 1000px; cursor: grab; 
        }
        .scene:active { cursor: grabbing; } 

        .carousel {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transform: translateZ(-250px); 
        }
        .carousel-cell {
            position: absolute; width: 180px; height: 260px;
            left: 10px; top: 10px;
            border: 3px solid #ddd; border-radius: 15px;
            background-color: white; box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .carousel-cell img { width: 100px; height: 100px; pointer-events: none; }
        
        .carousel-cell h4 { margin: 5px 0 2px; font-size: 16px; color: #555; }
        .carousel-cell h3 { margin: 0 0 5px; font-size: 20px; color: #d32f2f; }
        
        .carousel-cell p { margin: 2px; font-size: 13px; font-weight: bold; color: #666; }
        .type-tag { color: #fff; background-color: #607d8b; padding: 2px 8px; border-radius: 10px; font-size: 12px;}
        
        .btn-select { 
            margin-top: 10px; background-color: #4CAF50; color: white; 
            padding: 8px 15px; border-radius: 5px; font-size: 14px; box-shadow: none;
            cursor: pointer; pointer-events: auto; 
        }
        .btn-select:hover { background-color: #45a049; }
        
        .carousel-controls { margin-top: 30px; }

        /* ================= 戰鬥畫面區塊 ================= */
        .game-board { 
            display: flex; justify-content: center; align-items: flex-start; 
            gap: 30px; max-width: 1000px; margin: 0 auto; width: 100%;
        }
        .card { 
            border: 3px solid #ddd; border-radius: 15px; padding: 20px; 
            width: 220px; background-color: white; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.15); 
            display: flex; flex-direction: column; align-items: center;
            box-sizing: border-box;
        }
        .card img { width: 160px; height: 160px; }
        
        .card h2 { margin: 10px 0 0; font-size: 20px; color: #555; }
        .card h3.zh-name { margin: 5px 0 10px; font-size: 24px; color: #d32f2f; }

        .stats { 
            font-weight: bold; color: #555; text-align: left; width: 100%; 
            box-sizing: border-box; background-color: #f9f9f9;
            border-radius: 8px; padding: 10px; margin-top: 10px;
        }
        .stats p { margin: 5px 0; font-size: 14px; }
        
        #log-container {
            flex-grow: 1; max-width: 450px; height: 400px; width: 100%; box-sizing: border-box;
            background-color: #222; color: #fff; border-radius: 10px;
            padding: 15px; text-align: left; overflow-y: auto; 
            font-family: 'Courier New', Courier, monospace; font-size: 16px;
            line-height: 1.8; box-shadow: inset 0 0 15px rgba(0,0,0,0.9); border: 4px solid #444;
        }
        #log-container::-webkit-scrollbar { width: 8px; }
        #log-container::-webkit-scrollbar-thumb { background: #666; border-radius: 4px; }

        /* ================= 手機版響應式設計 (RWD) ================= */
        /* 當螢幕寬度小於 768px (例如手機、直向平板) 時，套用以下規則 */
        @media (max-width: 768px) {
            
            /* 控制按鈕區：改為上下排列，並加寬 */
            .controls {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }
            button {
                width: 90%;
                max-width: 300px;
                margin: 0;
            }

            /* 3D 旋轉木馬：整體縮放 65%，避免撐破手機左右兩側 */
            .scene {
                transform: scale(0.65);
                margin: 0 auto 20px auto; 
            }
            .drag-hint { font-size: 14px; }

            /* 戰鬥排版：由「左右」並排改為「上下」垂直排列 */
            .game-board {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }

            /* 重新排序 (核心魔法)：對手在最上面，文字居中，玩家在最下面 */
            #enemy-card { order: 1; width: 95%; max-width: 350px; }
            #log-container { 
                order: 2; 
                width: 95%; 
                max-width: 350px; 
                height: 250px; /* 手機螢幕較短，文字框高度調降 */
                font-size: 14px; 
            }
            #player-card { order: 3; width: 95%; max-width: 350px; }

            /* 縮小卡片內的圖片與文字，節省垂直空間，讓畫面更緊湊 */
            .card { padding: 15px; }
            .card img { width: 120px; height: 120px; }
            .card h3.zh-name { font-size: 20px; margin: 0 0 5px; }
            .card h2 { font-size: 16px; }
        }
    </style>
</head>
<body>
    <h1>寶可夢 3D 卡牌對戰</h1>
    
    <div class="controls">
        <button onclick="drawCards()" id="btn-draw">🎲 抽取 5 張卡牌</button>
        <button onclick="startBattle()" id="btn-battle" disabled>⚔️ 開始戰鬥！</button>
    </div>

    <div id="selection-screen" style="display: none;">
        <div class="drag-hint">🖐️ 按住並左右拖曳滑鼠來旋轉卡牌</div>
        
        <div class="scene" id="drag-scene">
            <div class="carousel">
                </div>
        </div>
        
        <div class="carousel-controls">
            <button onclick="drawCards()" id="btn-next-group">🔄 下一組 (不重複屬性)</button>
        </div>
    </div>

    <div class="game-board" id="battle-screen" style="display: none;">
        <div class="card" id="player-card">
            <h3 style="margin:0; color:#888; font-size:16px;">玩家</h3>
            <img id="player-img" src="">
            <h2 id="player-name">???</h2>
            <h3 class="zh-name" id="player-name-zh">???</h3> 
            <div class="stats">
                <p>❤️ HP: <span id="player-hp">-</span> / <span id="player-max-hp">-</span></p>
                <p>⚔️ 攻擊: <span id="player-atk">-</span></p>
            </div>
        </div>

        <div id="log-container">
            <div id="log">請先選擇卡牌，然後點擊「開始戰鬥！」</div>
        </div>

        <div class="card" id="enemy-card">
            <h3 style="margin:0; color:#888; font-size:16px;">對手</h3>
            <img id="enemy-img" src="">
            <h2 id="enemy-name">???</h2>
            <h3 class="zh-name" id="enemy-name-zh">???</h3> 
            <div class="stats">
                <p>❤️ HP: <span id="enemy-hp">-</span> / <span id="enemy-max-hp">-</span></p>
                <p>⚔️ 攻擊: <span id="enemy-atk">-</span></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
